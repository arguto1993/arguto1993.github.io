name: Deploy Portfolio

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # postbuild (prerender.mjs) runs automatically — generates dist/sitemap.xml
        # and injects static HTML for crawler visibility

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          npx gh-pages -d dist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Requires a Personal Access Token (classic) with repo scope stored as GH_TOKEN secret.
          # Alternatively, go to Settings → Actions → General → Workflow permissions
          # and set "Read and write permissions", then use GITHUB_TOKEN instead.

      - name: Ping IndexNow
        run: node scripts/ping-indexing.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        # Notifies Bing/Yandex/others of new content immediately after deploy.
        # Requires INDEXNOW_KEY secret and matching public/<key>.txt file in the repo.
