name: Deploy Portfolio

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # postbuild (prerender.mjs) runs automatically — generates dist/sitemap.xml
        # and injects static HTML for crawler visibility

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/arguto1993/arguto1993.github.io.git
          npx gh-pages -d dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ping IndexNow
        run: node scripts/ping-indexing.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        # Notifies Bing/Yandex/others of new content immediately after deploy.
        # Requires INDEXNOW_KEY secret and matching public/<key>.txt file in the repo.
